<!DOCTYPE html >

        <style>
            body {
               .bluemun-style {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 100px;
      letter-spacing: 8px;
      color: #0947c2;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
    }
            }

            section {
                position: relative;
                width: 100%;
                height: 700px;
                object-fit: cover;
                
            }

            section img{

                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                z-index:-1;
            }
            .overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.35);
            }

            .nav {
                position: absolute;
                top:40px;
                left: 30px;
                color: white;
                text-align: right;
                font-size: 18px;
                letter-spacing:2px;
            }
            .nav a {
                color: white;
                text-decoration: none;
                margin-left: 20px;
            }

            .title {
                position: absolute;
                right: 40px;
                top: 100px;
                color: white;
                text-align: right;
                max-width: 500px;
            }

            .title h1 {
                font-size: 100px;
                margin: 0;
                line-height: 1.1;
                text-transform: uppercase;
            }

            .desc-left {
                position: absolute;
                left: 70px;
                bottom:150px;
                color: white;
                max-width: 480px;
            }

            .desc-right {
                position: absolute;
                right: 30px;
                bottom:50px;
                color: rgb(208, 210, 214);
                max-width: 450px;
            }

            .button {
                display: inline-block;
                margin-top:25px;
                padding: 12px 30px;
                border: 1px solid white;
                color: white;
                text-decoration: none;
            }
