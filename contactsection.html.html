/* SECTION */
.contact-section {
    display: flex;
    min-height: 100vh;
}

/* LEFT SIDE */
.contact-left {
    flex: 1;
    background: rgb(131, 142, 199);

    padding: 60px;

/* RIGHT SIDE */

}

form {

}

input, textarea {
    width: 100%;
    padding: 12px;
    border: none;
    border-bottom: 1px solid #999;
    background: transparent;
    outline: none;
}

textarea {
    resize: none;
    height: 100px;
}

button {
    background: #111;
    color: #fff;
    padding: 12px 30px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #333;

/* RESPONSIVE */
@media (max-width: 768px) {
